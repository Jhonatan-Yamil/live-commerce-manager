name: Deploy to EC2
# try1
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - ".github/workflows/deploy-ec2.yml"
      - ".env.prod.example"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to EC2
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.venv/' \
            --exclude 'backend/venv/' \
            --exclude 'backend/__pycache__/' \
            --exclude 'backend/uploads/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/build/' \
            --exclude 'frontend/.cache/' \
            --exclude '.env' \
            --exclude '.env.prod' \
            -e "ssh -i ~/.ssh/ec2_key" ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/live-commerce-manager/"

      - name: Write production env file on EC2
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -euo pipefail
            cd /opt/live-commerce-manager
            umask 077
            python3 - <<'PY'
from pathlib import Path
import os

Path('.env.prod').write_text(os.environ['PROD_ENV_FILE'], encoding='utf-8')
PY
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
          EOF
