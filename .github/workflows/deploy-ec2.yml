name: Deploy to EC2 with Nginx + SSL
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - "infra/**"
      - ".github/workflows/deploy-ec2.yml"

env:
  APP_DIR: /opt/live-commerce-manager
  DOMAIN: livecommerce.duckdns.org
  DOCKER_COMPOSE_CMD: docker compose

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend in CI
        run: |
          cd frontend
          npm ci
          REACT_APP_API_URL=/api npm run build
          echo "✅ Frontend built in GitHub Actions"
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/ec2_key
            StrictHostKeyChecking no
            ServerAliveInterval 60
            ServerAliveCountMax 5
          EOF

      - name: Sync project files to EC2
        run: |
          rsync -azv --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.venv/' \
            --exclude 'backend/venv/' \
            --exclude 'backend/__pycache__/' \
            --exclude 'backend/uploads/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/.cache/' \
            --exclude 'frontend/src/' \
            --exclude 'frontend/public/' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude 'infra/nginx/nginx.conf' \
            -e "ssh -i ~/.ssh/ec2_key -o ServerAliveInterval=60" ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.APP_DIR }}/"
          echo "✅ Project files synced"

      - name: Sync frontend build to EC2
        run: |
          rsync -azv --delete \
            -e "ssh -i ~/.ssh/ec2_key -o ServerAliveInterval=60" \
            frontend/build/ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.APP_DIR }}/frontend/build/"
          echo "✅ Frontend build synced to EC2"
          
      - name: Bootstrap Docker & system dependencies on EC2
        run: |
          ssh -o ServerAliveInterval=60 -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail
          echo "📦 Installing system dependencies..."
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf check-update || true
          elif command -v yum >/dev/null 2>&1; then
            sudo yum check-update || true
          fi
          
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com | sudo bash
            sudo usermod -aG docker "$USER" || true
          fi
          
          if ! command -v docker compose &> /dev/null && ! command -v docker-compose &> /dev/null; then
            echo "Installing Docker Compose..."
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi
          
          sudo systemctl enable docker || true
          sudo systemctl start docker || true
          
          docker --version
          docker compose version || docker-compose --version
          '

      - name: Initialize SSL/TLS (Nginx + Certbot)
        run: |
          ssh -o ServerAliveInterval=60 -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail
          echo "🔐 Setting up Nginx + Let'\''s Encrypt..."
          chmod +x "${{ env.APP_DIR }}/infra/init-ssl.sh"
          sudo "${{ env.APP_DIR }}/infra/init-ssl.sh" "${{ env.DOMAIN }}" "admin@livesale.bo"
          '

      - name: Write production .env.prod file
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s' "$PROD_ENV_FILE" | ssh -o ServerAliveInterval=60 -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail
          cd "${{ env.APP_DIR }}"
          umask 077
          cat > .env.prod
          echo "✅ .env.prod written"
          '

      - name: Start Docker Compose services
        run: |
          ssh -o ServerAliveInterval=60 -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail
          cd "${{ env.APP_DIR }}"
          compose_cmd() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose "$@"
            else
              echo "❌ Docker Compose is not available"
              exit 1
            fi
          }

          echo "🐳 Building and starting Docker services..."
          compose_cmd -f docker-compose.prod.yml --env-file .env.prod up -d --build --force-recreate

          echo "⏳ Waiting for backend to respond on 127.0.0.1:8000..."
          backend_ready=false
          for i in {1..90}; do
            if curl -fsS --max-time 5 http://127.0.0.1:8000/openapi.json >/dev/null 2>&1; then
              backend_ready=true
              echo "✅ Backend is responding"
              break
            fi
            echo "Attempt $i/90..."
            sleep 2
          done

          if [ "$backend_ready" != "true" ]; then
            echo "❌ Backend did not respond in time"
            compose_cmd -f docker-compose.prod.yml logs backend | tail -50
            exit 1
          fi
          '

      - name: Run database migrations
        run: |
          ssh -o ServerAliveInterval=60 -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail
          cd "${{ env.APP_DIR }}"
          compose_cmd() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose "$@"
            else
              echo "❌ Docker Compose is not available"
              exit 1
            fi
          }

          echo "🗄️ Running Alembic migrations..."
          compose_cmd -f docker-compose.prod.yml --env-file .env.prod exec -T backend alembic upgrade head || {
            echo "⚠️ Migrations failed, but continuing..."
            compose_cmd -f docker-compose.prod.yml --env-file .env.prod logs backend | tail -20
          }
          '

      - name: Configure Telegram webhook
        run: |
          ssh -o ServerAliveInterval=60 -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail
          cd "${{ env.APP_DIR }}"
          
          TOKEN=$(grep -E "^TELEGRAM_BOT_TOKEN=" .env.prod | cut -d'"'"'='"'"' -f2- || echo "")
          SECRET=$(grep -E "^TELEGRAM_WEBHOOK_SECRET=" .env.prod | cut -d'"'"'='"'"' -f2- || echo "")
          BASE_URL="https://${{ env.DOMAIN }}"
          
          if [ -n "$TOKEN" ] && [ -n "$SECRET" ]; then
            echo "🤖 Configuring Telegram webhook..."
            WEBHOOK_URL="${BASE_URL}/api/integrations/telegram/webhook/${SECRET}"
            RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/setWebhook" \
              -d "url=${WEBHOOK_URL}" \
              -d "drop_pending_updates=false" \
              -d "secret_token=${SECRET}")
            
            if echo "$RESPONSE" | grep -q '"ok":true'; then
              echo "✅ Telegram webhook configured: $WEBHOOK_URL"
            else
              echo "⚠️ Telegram webhook response: $RESPONSE"
            fi
          else
            echo "⚠️ Telegram token or secret not found in .env.prod"
          fi
          '

      - name: Health check
        run: |
          ssh -o ServerAliveInterval=60 -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail
          echo "🔍 Running health checks..."
          compose_cmd() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose "$@"
            else
              echo "❌ Docker Compose is not available"
              exit 1
            fi
          }
          
          if curl -k -s https://127.0.0.1 >/dev/null 2>&1; then
            echo "✅ Nginx is responding"
          else
            echo "⚠️ Nginx health check failed"
          fi
          
          cd "${{ env.APP_DIR }}"
          compose_cmd -f docker-compose.prod.yml ps
          '

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Access your application at: https://${{ env.DOMAIN }}"
          echo "📋 Check logs with: ssh ec2-user@${{ secrets.EC2_HOST }} docker compose -f /opt/live-commerce-manager/docker-compose.prod.yml logs -f"
