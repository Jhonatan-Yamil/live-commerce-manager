name: Deploy to EC2
# try1
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - ".github/workflows/deploy-ec2.yml"
      - ".env.prod.example"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to EC2
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.venv/' \
            --exclude 'backend/venv/' \
            --exclude 'backend/__pycache__/' \
            --exclude 'backend/uploads/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/build/' \
            --exclude 'frontend/.cache/' \
            --exclude '.env' \
            --exclude '.env.prod' \
            -e "ssh -i ~/.ssh/ec2_key" ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/live-commerce-manager/"

      - name: Bootstrap Docker on EC2
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail; if ! command -v docker >/dev/null 2>&1; then sudo dnf -y install docker; sudo systemctl enable --now docker; sudo usermod -aG docker ec2-user || true; fi; if ! command -v docker-compose >/dev/null 2>&1 && ! sudo docker compose version >/dev/null 2>&1; then sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose && sudo chmod +x /usr/local/bin/docker-compose; fi; docker --version; docker compose version || docker-compose --version'

      - name: Write production env file on EC2
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s' "$PROD_ENV_FILE" | ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'set -euo pipefail; cd /opt/live-commerce-manager; umask 077; cat > .env.prod; sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build'
