services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-livesale}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-livesale}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  evolution-db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${EVOLUTION_DB_NAME:-evolution_api}
      POSTGRES_USER: ${EVOLUTION_DB_USER:-evolution}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD}
    volumes:
      - evolutionpgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVOLUTION_DB_USER:-evolution} -d ${EVOLUTION_DB_NAME:-evolution_api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-livesale}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      WHATSAPP_WEBHOOK_PUBLIC_URL: ${WHATSAPP_WEBHOOK_PUBLIC_URL:-https://${DOMAIN_NAME}/api/integrations/whatsapp/webhook/${WHATSAPP_WEBHOOK_SECRET}}
      WHATSAPP_EVOLUTION_INTEGRATION: ${WHATSAPP_EVOLUTION_INTEGRATION:-WHATSAPP-BAILEYS}
      WHATSAPP_EVOLUTION_INSTANCE_NAME: ${WHATSAPP_EVOLUTION_INSTANCE_NAME}
      INTAKE_ASYNC_ENABLED: ${INTAKE_ASYNC_ENABLED:-true}
      INTAKE_QUEUE_BACKEND: ${INTAKE_QUEUE_BACKEND:-memory}
      INTAKE_QUEUE_KEY: ${INTAKE_QUEUE_KEY:-live-sale:intake-queue}
      INTAKE_WORKER_EMBEDDED: ${INTAKE_WORKER_EMBEDDED:-true}
      INTAKE_MAX_FILE_SIZE_MB: ${INTAKE_MAX_FILE_SIZE_MB:-10}
      INTAKE_HASH_DEDUP_WINDOW_HOURS: ${INTAKE_HASH_DEDUP_WINDOW_HOURS:-24}
      REDIS_URL: redis://redis:6379/0
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET}
      WHATSAPP_EVOLUTION_BASE_URL: ${WHATSAPP_EVOLUTION_BASE_URL:-http://evolution-api:8080}
      WHATSAPP_EVOLUTION_API_KEY: ${WHATSAPP_EVOLUTION_API_KEY}
      WHATSAPP_EVOLUTION_INSTANCE_NAME: ${WHATSAPP_EVOLUTION_INSTANCE_NAME}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOADS_DIR: uploads
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://evolution-api:8080
      AUTHENTICATION_API_KEY: ${WHATSAPP_EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${EVOLUTION_DB_USER:-evolution}:${EVOLUTION_DB_PASSWORD}@evolution-db:5432/${EVOLUTION_DB_NAME:-evolution_api}
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution-cache
      CACHE_REDIS_SAVE_INSTANCES: true
      WEBHOOK_GLOBAL_ENABLED: true
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: true
      WEBHOOK_GLOBAL_URL: ${WHATSAPP_WEBHOOK_PUBLIC_URL:-https://${DOMAIN_NAME}/api/integrations/whatsapp/webhook/${WHATSAPP_WEBHOOK_SECRET}}
      WEBHOOK_EVENTS_APPLICATION_STARTUP: true
      WEBHOOK_EVENTS_QRCODE_UPDATED: false
      WEBHOOK_EVENTS_MESSAGES_SET: false
      WEBHOOK_EVENTS_MESSAGES_UPSERT: true
      WEBHOOK_EVENTS_MESSAGES_EDITED: false
      WEBHOOK_EVENTS_MESSAGES_UPDATE: true
      WEBHOOK_EVENTS_MESSAGES_DELETE: false
      WEBHOOK_EVENTS_SEND_MESSAGE: false
      WEBHOOK_EVENTS_SEND_MESSAGE_UPDATE: false
    depends_on:
      evolution-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prebuilt
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db_backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-livesale}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "-Z9 --schema=public --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
      HEALTHCHECK_PORT: 8080
    volumes:
      - pgbackups:/backups
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
  pgbackups:
  evolutionpgdata:
